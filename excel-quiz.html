<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCスキルクイズ | Excel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <nav class="nav">
    <div class="logo">
      <img src="images/pclab.logo1.png" alt="ロゴ">
    </div>
    <ul>
      <li><a href="index.html">ホーム</a></li>
    </ul>
  </nav>
</header>

<main class="column-page">
    <div class="quiz-header">
        <h1>PCスキルクイズ：Excel編</h1>
    </div>

    <div class="quiz-card">
        <h2>Q1. 余白を変更するときに使うタブは？</h2>

        <div class="answer-list">
            <button data-correct="true">A. レイアウトタブ</button>
            <button data-correct="false">B. 挿入タブ</button>
            <button data-correct="false">C. ホームタブ</button>
            <button data-correct="false">D. 描画タブ</button>
        </div>

        <p class="explanation">
            レイアウトタブの「ページ設定」グループで余白を変更できます。
        </p>
    </div>

    <div class="quiz-card">
        <h2>Q2. ページ番号やヘッダー、フッターを挿入した後に閉じなければいけないタブは？</h2>

        <div class="answer-list">
            <button data-correct="false">A. 挿入タブ</button>
            <button data-correct="true">B. ヘッダーとフッタータブ</button>
            <button data-correct="false">C. レイアウトタブ</button>
            <button data-correct="false">D. ホームタブ</button>
        </div>

        <p class="explanation">
            ヘッダーとフッタータブを閉じなければ、他の操作ができなくなるから注意しよう！
        </p>
    </div>

    <div class="quiz-card">
        <h2>Q3. Wordで文字を太字にするショートカットは？</h2>

        <div class="answer-list">
            <button data-correct="true">A. Ctrl + B</button>
            <button data-correct="false">B. Ctrl + I</button>
            <button data-correct="false">C. Ctrl + U</button>
            <button data-correct="false">D. ホームタブ</button>
        </div>

        <p class="explanation">
            ヘッダーとフッタータブを閉じなければ、他の操作ができなくなるから注意しよう！
        </p>
    </div>
</main>

</body>
</html>
